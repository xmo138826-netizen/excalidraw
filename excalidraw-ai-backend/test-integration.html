<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw AI 集成测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      width: 100%;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .output {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output.loading {
      color: #666;
      font-style: italic;
    }

    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .example-btn {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .example-btn:hover {
      background: #e0e0e0;
      border-color: #667eea;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Excalidraw AI 集成测试</h1>
    <p class="subtitle">测试智谱 AI 后端服务与 Excalidraw 前端的集成</p>

    <div id="status" class="status info">
      <span>⏳</span>
      <span>正在检查后端服务状态...</span>
    </div>

    <div class="examples">
      <button class="example-btn" onclick="setPrompt('创建一个关于机器学习的思维导图')">机器学习</button>
      <button class="example-btn" onclick="setPrompt('创建一个关于Web开发的思维导图')">Web开发</button>
      <button class="example-btn" onclick="setPrompt('创建一个关于Python编程的思维导图')">Python编程</button>
      <button class="example-btn" onclick="setPrompt('创建一个关于项目管理的思维导图')">项目管理</button>
    </div>

    <div class="input-group">
      <label for="prompt">输入思维导图主题：</label>
      <input
        type="text"
        id="prompt"
        placeholder="例如：创建一个关于人工智能的思维导图"
        value="创建一个关于机器学习的思维导图"
      >
    </div>

    <button id="generateBtn" onclick="generateMindMap()">🚀 生成思维导图</button>

    <div id="output" class="output">
      <div class="loading">等待生成...</div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="requestCount">0</div>
        <div class="stat-label">请求数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">字符数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="timeCount">0s</div>
        <div class="stat-label">耗时</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3016/v1/ai/text-to-diagram/chat-streaming';
    let requestCount = 0;

    // 检查后端服务状态
    async function checkBackendStatus() {
      try {
        const response = await fetch('http://localhost:3016/health');
        const data = await response.json();

        if (data.status === 'ok') {
          updateStatus('success', `✅ 后端服务正常 (模型: ${data.service})`);
        } else {
          updateStatus('error', '❌ 后端服务异常');
        }
      } catch (error) {
        updateStatus('error', '❌ 无法连接到后端服务，请确保服务已启动');
      }
    }

    // 更新状态显示
    function updateStatus(type, message) {
      const statusEl = document.getElementById('status');
      statusEl.className = `status ${type}`;
      statusEl.innerHTML = message;
    }

    // 设置提示词
    function setPrompt(text) {
      document.getElementById('prompt').value = text;
    }

    // 生成思维导图
    async function generateMindMap() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        alert('请输入思维导图主题');
        return;
      }

      const outputEl = document.getElementById('output');
      const generateBtn = document.getElementById('generateBtn');
      const startTime = Date.now();

      // 重置输出
      outputEl.textContent = '';
      outputEl.classList.add('loading');
      generateBtn.disabled = true;
      generateBtn.textContent = '⏳ 生成中...';

      updateStatus('info', '🔄 正在调用 AI 生成思维导图...');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            messages: [
              { role: 'user', content: prompt }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';
        let buffer = '';

        outputEl.classList.remove('loading');

        while (true) {
          const { done, value } = await reader.read();

          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);

              if (data === '[DONE]') {
                updateStatus('success', '✅ 思维导图生成完成！');
                break;
              }

              try {
                const chunk = JSON.parse(data);

                if (chunk.type === 'content' && chunk.delta) {
                  fullResponse += chunk.delta;
                  outputEl.textContent = fullResponse;

                  // 更新统计
                  document.getElementById('charCount').textContent = fullResponse.length;
                  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                  document.getElementById('timeCount').textContent = `${elapsed}s`;
                }

                if (chunk.type === 'error') {
                  throw new Error(chunk.error.message);
                }
              } catch (e) {
                console.warn('解析错误:', e);
              }
            }
          }
        }

        requestCount++;
        document.getElementById('requestCount').textContent = requestCount;

      } catch (error) {
        updateStatus('error', `❌ 生成失败: ${error.message}`);
        outputEl.textContent = `错误: ${error.message}`;
        outputEl.classList.remove('loading');
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '🚀 生成思维导图';
      }
    }

    // 页面加载时检查后端状态
    window.addEventListener('load', () => {
      checkBackendStatus();
    });
  </script>
</body>
</html>
