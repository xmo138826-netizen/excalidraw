version: '3.8'

services:
  excalidraw-ai-backend:
    build: .
    container_name: excalidraw-ai-backend
    ports:
      - "3016:3016"
    environment:
      - NODE_ENV=production
      - PORT=3016
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - ZHIPUAI_MODEL=${ZHIPUAI_MODEL:-glm-4-flash}
      - RATE_LIMIT_LIMIT=${RATE_LIMIT_LIMIT:-100}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-86400000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
